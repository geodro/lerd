name: phpmyadmin
image: docker.io/library/phpmyadmin:latest
description: phpMyAdmin web UI for every installed lerd MySQL service
ports:
  - "8080:80"
environment:
  UPLOAD_LIMIT: 256M
dynamic_env:
  PMA_HOSTS: discover_family:mysql,mariadb
  PMA_USERS: repeat_family:mysql,mariadb=root
  PMA_PASSWORDS: repeat_family:mysql,mariadb=lerd
depends_on:
  - mysql
dashboard: http://localhost:8080
