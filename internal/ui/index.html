<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lerd Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen" x-data="lerdApp()" x-init="init()" x-cloak>

  <!-- Sidebar + Content layout -->
  <div class="flex min-h-screen">

    <!-- Sidebar -->
    <aside class="w-56 bg-gray-900 text-white flex flex-col shrink-0">
      <div class="px-6 py-6 border-b border-gray-700">
        <div class="flex items-center gap-2">
          <span class="text-xl font-bold tracking-tight">Lerd</span>
          <span class="text-xs text-gray-400 mt-1" x-text="'v' + version.current"></span>
        </div>
        <p class="text-xs text-gray-500 mt-1">Local Dev Environment</p>
      </div>

      <nav class="flex-1 px-3 py-4 space-y-1">
        <button
          @click="tab = 'sites'"
          :class="tab === 'sites' ? 'bg-gray-700 text-white' : 'text-gray-400 hover:bg-gray-800 hover:text-white'"
          class="w-full text-left px-3 py-2 rounded-md text-sm font-medium transition-colors"
        >
          Sites
        </button>
        <button
          @click="tab = 'services'"
          :class="tab === 'services' ? 'bg-gray-700 text-white' : 'text-gray-400 hover:bg-gray-800 hover:text-white'"
          class="w-full text-left px-3 py-2 rounded-md text-sm font-medium transition-colors"
        >
          Services
        </button>
        <button
          @click="tab = 'system'"
          :class="tab === 'system' ? 'bg-gray-700 text-white' : 'text-gray-400 hover:bg-gray-800 hover:text-white'"
          class="w-full text-left px-3 py-2 rounded-md text-sm font-medium transition-colors"
        >
          System
        </button>
      </nav>

      <!-- Version / Update section at bottom -->
      <div class="px-4 py-4 border-t border-gray-700 space-y-2">
        <template x-if="!version.checked">
          <button
            @click="checkVersion()"
            :disabled="version.checking"
            class="w-full text-xs bg-gray-700 hover:bg-gray-600 text-gray-200 rounded px-3 py-1.5 transition-colors disabled:opacity-50"
          >
            <span x-show="!version.checking">Check for update</span>
            <span x-show="version.checking">Checking...</span>
          </button>
        </template>

        <template x-if="version.checked && !version.hasUpdate">
          <div class="text-xs text-center text-green-400 bg-green-900/30 rounded px-3 py-1.5">
            Up to date
          </div>
        </template>

        <template x-if="version.checked && version.hasUpdate">
          <div class="space-y-1.5">
            <div class="text-xs text-center text-yellow-300 bg-yellow-900/30 rounded px-3 py-1.5">
              <span x-text="version.latest + ' available'"></span>
            </div>
            <button
              @click="runUpdate()"
              :disabled="version.updating"
              class="w-full text-xs bg-blue-600 hover:bg-blue-500 text-white rounded px-3 py-1.5 transition-colors disabled:opacity-50"
            >
              <span x-show="!version.updating">Update</span>
              <span x-show="version.updating">Updating...</span>
            </button>
          </div>
        </template>

        <template x-if="version.updateDone">
          <div class="text-xs text-center text-green-400 bg-green-900/30 rounded px-3 py-1.5">
            Update complete — restart lerd-ui
          </div>
        </template>
      </div>
    </aside>

    <!-- Main content -->
    <main class="flex-1 flex flex-col min-w-0">

      <!-- Top bar -->
      <header class="bg-white border-b border-gray-200 px-8 py-4 flex items-center justify-between shrink-0">
        <h1 class="text-lg font-semibold text-gray-800" x-text="tabTitle()"></h1>
        <div class="flex items-center gap-3">
          <template x-if="tab === 'sites'">
            <button
              @click="loadSites()"
              class="text-sm bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 rounded-md px-4 py-1.5 transition-colors"
            >
              Refresh
            </button>
          </template>
        </div>
      </header>

      <!-- Tab content -->
      <div class="flex-1 p-8 overflow-auto">

        <!-- ===== SITES TAB ===== -->
        <div x-show="tab === 'sites'">
          <template x-if="sitesLoading">
            <div class="text-gray-500 text-sm">Loading sites...</div>
          </template>
          <template x-if="!sitesLoading && sites.length === 0">
            <div class="text-gray-500 text-sm">No sites registered. Use <code class="bg-gray-100 px-1 rounded">lerd park</code> or <code class="bg-gray-100 px-1 rounded">lerd link</code> to add sites.</div>
          </template>
          <template x-if="!sitesLoading && sites.length > 0">
            <div class="bg-white rounded-lg border border-gray-200 overflow-hidden">
              <table class="w-full text-sm">
                <thead class="bg-gray-50 border-b border-gray-200">
                  <tr>
                    <th class="text-left px-4 py-3 font-medium text-gray-600">Domain</th>
                    <th class="text-left px-4 py-3 font-medium text-gray-600">Path</th>
                    <th class="text-left px-4 py-3 font-medium text-gray-600">PHP</th>
                    <th class="text-left px-4 py-3 font-medium text-gray-600">Node</th>
                    <th class="text-left px-4 py-3 font-medium text-gray-600">HTTPS</th>
                    <th class="text-left px-4 py-3 font-medium text-gray-600">Status</th>
                  </tr>
                </thead>
                <tbody class="divide-y divide-gray-100">
                  <template x-for="site in sites" :key="site.domain">
                    <tr
                      class="hover:bg-blue-50 cursor-pointer transition-colors"
                      :class="logs.container === fpmContainer(site) && logs.open ? 'bg-blue-50' : ''"
                      @click="openLogs(site)"
                      title="Click to view live PHP-FPM logs"
                    >
                      <td class="px-4 py-3">
                        <a
                          :href="(site.tls ? 'https://' : 'http://') + site.domain"
                          target="_blank"
                          rel="noopener"
                          class="text-blue-600 hover:underline font-medium"
                          x-text="site.domain"
                          @click.stop
                        ></a>
                      </td>
                      <td class="px-4 py-3 text-gray-600 font-mono text-xs truncate max-w-xs" x-text="site.path"></td>
                      <td class="px-4 py-3" @click.stop>
                        <select
                          x-model="site.php_version"
                          @change="setSiteVersion(site, 'php', site.php_version)"
                          class="text-xs border border-gray-200 rounded px-1.5 py-0.5 bg-white text-gray-700 hover:border-gray-400 focus:outline-none focus:border-blue-400 disabled:opacity-50 cursor-pointer"
                          :disabled="site.versionLoading"
                        >
                          <option value="" disabled>—</option>
                          <template x-for="v in phpVersions" :key="v">
                            <option :value="v" x-text="'PHP ' + v"></option>
                          </template>
                        </select>
                      </td>
                      <td class="px-4 py-3" @click.stop>
                        <select
                          x-model="site.node_version"
                          @change="setSiteVersion(site, 'node', site.node_version)"
                          class="text-xs border border-gray-200 rounded px-1.5 py-0.5 bg-white text-gray-700 hover:border-gray-400 focus:outline-none focus:border-blue-400 disabled:opacity-50 cursor-pointer"
                          :disabled="site.versionLoading"
                        >
                          <option value="" disabled>—</option>
                          <template x-for="v in nodeVersions" :key="v">
                            <option :value="v" x-text="'Node ' + v"></option>
                          </template>
                        </select>
                      </td>
                      <td class="px-4 py-3" @click.stop>
                        <div class="flex flex-col items-start gap-1">
                          <button
                            @click="toggleTLS(site)"
                            :disabled="site.tlsLoading"
                            :title="site.tls ? 'Disable HTTPS' : 'Enable HTTPS'"
                            class="relative inline-flex h-5 w-9 shrink-0 items-center rounded-full transition-colors duration-200 focus:outline-none disabled:opacity-50"
                            :class="site.tls ? 'bg-green-500' : 'bg-gray-300'"
                          >
                            <span
                              class="inline-block h-3.5 w-3.5 rounded-full bg-white shadow transition-transform duration-200"
                              :class="site.tls ? 'translate-x-4' : 'translate-x-1'"
                            ></span>
                            <svg x-show="site.tlsLoading" class="animate-spin absolute right-[-18px] w-3 h-3 text-gray-400" fill="none" viewBox="0 0 24 24">
                              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path>
                            </svg>
                          </button>
                          <div x-show="site.tlsError" class="text-[10px] text-red-600" x-text="site.tlsError"></div>
                        </div>
                      </td>
                      <td class="px-4 py-3">
                        <template x-if="site.fpm_running">
                          <span class="inline-flex items-center gap-1.5 text-xs font-medium text-green-700">
                            <span class="w-2 h-2 rounded-full bg-green-500"></span>running
                          </span>
                        </template>
                        <template x-if="!site.fpm_running">
                          <span class="inline-flex items-center gap-1.5 text-xs font-medium text-red-600">
                            <span class="w-2 h-2 rounded-full bg-red-400"></span>stopped
                          </span>
                        </template>
                      </td>
                    </tr>
                  </template>
                </tbody>
              </table>
            </div>
          </template>
        </div>

        <!-- ===== SERVICES TAB ===== -->
        <div x-show="tab === 'services'">
          <template x-if="servicesLoading">
            <div class="text-gray-500 text-sm">Loading services...</div>
          </template>
          <template x-if="!servicesLoading">
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
              <template x-for="svc in services" :key="svc.name">
                <div class="bg-white rounded-lg border border-gray-200 p-4 flex flex-col gap-3" :class="svc.error ? 'border-red-300' : ''">
                  <!-- Name + status indicator -->
                  <div class="flex items-center justify-between">
                    <span class="font-semibold text-gray-800" x-text="capitalize(svc.name)"></span>
                    <span class="flex items-center gap-1.5 text-xs" :class="svc.status === 'active' ? 'text-green-600' : 'text-gray-400'">
                      <span class="w-2 h-2 rounded-full" :class="svc.status === 'active' ? 'bg-green-500' : 'bg-gray-300'"></span>
                      <span x-text="svc.status"></span>
                    </span>
                  </div>

                  <!-- Action buttons -->
                  <div class="flex gap-2 mt-auto">
                    <template x-if="svc.status !== 'active'">
                      <button
                        @click="toggleService(svc, 'start')"
                        :disabled="svc.loading"
                        class="flex-1 flex items-center justify-center gap-1.5 text-xs font-medium bg-green-50 hover:bg-green-100 text-green-700 border border-green-200 rounded px-3 py-1.5 transition-colors disabled:opacity-50"
                      >
                        <svg x-show="svc.loading" class="animate-spin w-3 h-3" fill="none" viewBox="0 0 24 24">
                          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path>
                        </svg>
                        <span x-show="!svc.loading">Start</span>
                      </button>
                    </template>
                    <template x-if="svc.status === 'active'">
                      <button
                        @click="toggleService(svc, 'stop')"
                        :disabled="svc.loading"
                        class="flex-1 flex items-center justify-center gap-1.5 text-xs font-medium bg-red-50 hover:bg-red-100 text-red-700 border border-red-200 rounded px-3 py-1.5 transition-colors disabled:opacity-50"
                      >
                        <svg x-show="svc.loading" class="animate-spin w-3 h-3" fill="none" viewBox="0 0 24 24">
                          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path>
                        </svg>
                        <span x-show="!svc.loading">Stop</span>
                      </button>
                    </template>

                    <button
                      @click="svc.showEnv = !svc.showEnv"
                      class="text-xs font-medium bg-gray-50 hover:bg-gray-100 text-gray-600 border border-gray-200 rounded px-3 py-1.5 transition-colors"
                      :title="'Toggle .env vars for ' + svc.name"
                      x-text="svc.showEnv ? 'Hide .env' : 'Show .env'"
                    ></button>
                  </div>

                  <!-- Env vars preview -->
                  <div x-show="svc.showEnv" class="rounded border border-gray-200 overflow-hidden">
                    <div class="flex items-center justify-between bg-gray-100 px-3 py-1.5 border-b border-gray-200">
                      <span class="text-[10px] font-semibold text-gray-500 uppercase tracking-wide">.env</span>
                      <button
                        @click="copyEnvVars(svc)"
                        class="text-[10px] font-medium text-blue-600 hover:text-blue-800 transition-colors"
                      >
                        <span x-show="!svc.copied">Copy</span>
                        <span x-show="svc.copied" class="text-green-600">Copied!</span>
                      </button>
                    </div>
                    <pre class="bg-gray-900 text-gray-100 px-3 py-2 text-[10px] leading-relaxed overflow-x-auto whitespace-pre" x-text="envPreview(svc)"></pre>
                  </div>

                  <!-- Success feedback -->
                  <div x-show="svc.flash" class="text-xs text-center text-green-700 bg-green-50 rounded px-2 py-1" x-text="svc.flash"></div>

                  <!-- Error feedback -->
                  <template x-if="svc.error">
                    <div class="space-y-1">
                      <div class="text-xs font-medium text-red-700 bg-red-50 rounded px-2 py-1" x-text="svc.error"></div>
                      <template x-if="svc.logs">
                        <details class="text-xs">
                          <summary class="cursor-pointer text-gray-500 hover:text-gray-700 px-1">Show logs</summary>
                          <pre class="mt-1 bg-gray-900 text-gray-100 rounded p-2 overflow-x-auto text-[10px] leading-relaxed whitespace-pre-wrap" x-text="svc.logs"></pre>
                        </details>
                      </template>
                    </div>
                  </template>
                </div>
              </template>
            </div>
          </template>

          <!-- Install Node version -->
          <div class="mt-6">
            <h3 class="text-sm font-medium text-gray-700 mb-3">Install Node version</h3>
            <div class="flex items-center gap-2">
              <input
                type="text"
                x-model="nodeInstall.version"
                @keydown.enter="installNodeVersion()"
                placeholder="e.g. 22"
                class="text-sm border border-gray-200 rounded px-3 py-1.5 w-28 focus:outline-none focus:border-blue-400"
                :disabled="nodeInstall.installing"
              >
              <button
                @click="installNodeVersion()"
                :disabled="nodeInstall.installing || !nodeInstall.version.trim()"
                class="text-sm bg-blue-600 hover:bg-blue-700 text-white rounded px-4 py-1.5 transition-colors disabled:opacity-40 flex items-center gap-1.5"
              >
                <svg x-show="nodeInstall.installing" class="animate-spin w-3.5 h-3.5" fill="none" viewBox="0 0 24 24">
                  <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                  <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path>
                </svg>
                <span x-text="nodeInstall.installing ? 'Installing...' : 'Install'"></span>
              </button>
              <span x-show="nodeInstall.done" class="text-sm text-green-600">Installed!</span>
              <span x-show="nodeInstall.error" class="text-sm text-red-600" x-text="nodeInstall.error"></span>
            </div>
          </div>
        </div>

        <!-- ===== SYSTEM TAB ===== -->
        <div x-show="tab === 'system'">
          <template x-if="statusLoading">
            <div class="text-gray-500 text-sm">Loading system status...</div>
          </template>
          <template x-if="!statusLoading">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">

              <!-- DNS card -->
              <div class="bg-white rounded-lg border border-gray-200 p-5">
                <div class="flex items-center justify-between mb-3">
                  <h3 class="font-semibold text-gray-800">DNS</h3>
                  <template x-if="systemStatus.dns && systemStatus.dns.ok">
                    <span class="inline-flex items-center gap-1 text-xs font-medium text-green-700 bg-green-100 px-2 py-0.5 rounded-full">
                      <span class="w-1.5 h-1.5 rounded-full bg-green-500"></span>OK
                    </span>
                  </template>
                  <template x-if="!systemStatus.dns || !systemStatus.dns.ok">
                    <span class="inline-flex items-center gap-1 text-xs font-medium text-red-700 bg-red-100 px-2 py-0.5 rounded-full">
                      <span class="w-1.5 h-1.5 rounded-full bg-red-500"></span>Failed
                    </span>
                  </template>
                </div>
                <p class="text-sm text-gray-600">
                  TLD: <code class="bg-gray-100 px-1 rounded" x-text="'.' + (systemStatus.dns ? systemStatus.dns.tld : 'test')"></code>
                </p>
                <template x-if="!systemStatus.dns || !systemStatus.dns.ok">
                  <p class="text-xs text-gray-500 mt-2">Run <code class="bg-gray-100 px-1 rounded">lerd install</code> to fix DNS.</p>
                </template>
              </div>

              <!-- Nginx card -->
              <div class="bg-white rounded-lg border border-gray-200 p-5">
                <div class="flex items-center justify-between mb-3">
                  <h3 class="font-semibold text-gray-800">Nginx</h3>
                  <template x-if="systemStatus.nginx && systemStatus.nginx.running">
                    <span class="inline-flex items-center gap-1 text-xs font-medium text-green-700 bg-green-100 px-2 py-0.5 rounded-full">
                      <span class="w-1.5 h-1.5 rounded-full bg-green-500"></span>Running
                    </span>
                  </template>
                  <template x-if="!systemStatus.nginx || !systemStatus.nginx.running">
                    <span class="inline-flex items-center gap-1 text-xs font-medium text-red-700 bg-red-100 px-2 py-0.5 rounded-full">
                      <span class="w-1.5 h-1.5 rounded-full bg-red-500"></span>Stopped
                    </span>
                  </template>
                </div>
                <p class="text-sm text-gray-600">Podman container: <code class="bg-gray-100 px-1 rounded">lerd-nginx</code></p>
              </div>

              <!-- PHP FPM card -->
              <div class="bg-white rounded-lg border border-gray-200 p-5">
                <div class="flex items-center justify-between mb-3">
                  <h3 class="font-semibold text-gray-800">PHP-FPM</h3>
                </div>
                <template x-if="systemStatus.php_fpms && systemStatus.php_fpms.length === 0">
                  <p class="text-sm text-gray-500">No PHP versions installed.</p>
                </template>
                <template x-if="!systemStatus.php_fpms || systemStatus.php_fpms.length === 0">
                  <p class="text-xs text-gray-400 mt-1">Run <code class="bg-gray-100 px-1 rounded">lerd use 8.3</code> to install PHP.</p>
                </template>
                <ul class="space-y-1.5" x-show="systemStatus.php_fpms && systemStatus.php_fpms.length > 0">
                  <template x-for="fpm in systemStatus.php_fpms" :key="fpm.version">
                    <li class="flex items-center justify-between text-sm">
                      <span class="text-gray-700">PHP <span x-text="fpm.version"></span></span>
                      <template x-if="fpm.running">
                        <span class="inline-flex items-center gap-1 text-xs font-medium text-green-700">
                          <span class="w-1.5 h-1.5 rounded-full bg-green-500"></span>running
                        </span>
                      </template>
                      <template x-if="!fpm.running">
                        <span class="inline-flex items-center gap-1 text-xs font-medium text-red-600">
                          <span class="w-1.5 h-1.5 rounded-full bg-red-400"></span>stopped
                        </span>
                      </template>
                    </li>
                  </template>
                </ul>
              </div>

            </div>
          </template>
          <p class="text-xs text-gray-400 mt-4">Auto-refreshes every 10 seconds.</p>
        </div>

      </div>
    </main>
  </div>

<!-- Live logs drawer (fixed bottom) -->
<div
  x-show="logs.open"
  x-transition:enter="transition ease-out duration-200"
  x-transition:enter-start="translate-y-full opacity-0"
  x-transition:enter-end="translate-y-0 opacity-100"
  x-transition:leave="transition ease-in duration-150"
  x-transition:leave-start="translate-y-0 opacity-100"
  x-transition:leave-end="translate-y-full opacity-0"
  class="fixed bottom-0 left-56 right-0 h-72 bg-gray-950 border-t border-gray-700 flex flex-col z-50"
  style="display:none"
>
  <!-- Drawer header -->
  <div class="flex items-center justify-between px-4 py-2 border-b border-gray-700 shrink-0">
    <div class="flex items-center gap-3">
      <span class="text-xs font-semibold text-gray-300" x-text="logs.container"></span>
      <span class="flex items-center gap-1.5 text-[10px]" :class="logs.connected ? 'text-green-400' : 'text-gray-500'">
        <span class="w-1.5 h-1.5 rounded-full" :class="logs.connected ? 'bg-green-400 animate-pulse' : 'bg-gray-500'"></span>
        <span x-text="logs.connected ? 'live' : 'disconnected'"></span>
      </span>
    </div>
    <div class="flex items-center gap-3">
      <button
        @click="clearLogs()"
        class="text-[10px] text-gray-500 hover:text-gray-300 transition-colors"
      >Clear</button>
      <button
        @click="closeLogs()"
        class="text-gray-500 hover:text-gray-300 transition-colors"
        title="Close"
      >
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>
  </div>
  <!-- Log lines -->
  <div
    class="flex-1 overflow-y-auto px-4 py-2 font-mono text-[11px] leading-relaxed text-gray-300 space-y-0.5"
    x-ref="logScroll"
  >
    <template x-if="logs.lines.length === 0">
      <div class="text-gray-600 italic">Waiting for log output...</div>
    </template>
    <template x-for="(line, i) in logs.lines" :key="i">
      <div
        class="whitespace-pre-wrap break-all"
        :class="{
          'text-red-400': line.includes('ERROR') || line.includes('Error') || line.includes('error') || line.includes('PHP Fatal') || line.includes('PHP Warning'),
          'text-yellow-400': line.includes('WARNING') || line.includes('Warning') || line.includes('PHP Notice'),
          'text-gray-500': line.startsWith('#') || line.startsWith(';')
        }"
        x-text="line"
      ></div>
    </template>
  </div>
</div>

<script>
function lerdApp() {
  return {
    tab: 'sites',
    sites: [],
    sitesLoading: false,
    phpVersions: [],
    nodeVersions: [],
    services: [],
    servicesLoading: false,
    systemStatus: {},
    statusLoading: false,
    version: {
      current: '...',
      latest: '',
      hasUpdate: false,
      checked: false,
      checking: false,
      updating: false,
      updateDone: false,
    },
    _statusInterval: null,
    _sitesInterval: null,
    _sitesLoaded: false,
    nodeInstall: { version: '', installing: false, error: '', done: false },
    logs: {
      open: false,
      container: '',
      lines: [],
      connected: false,
      _source: null,
    },

    init() {
      this.loadVersion();
      this.loadSites();
      this.loadPHPVersions();
      this.loadNodeVersions();
      this.loadServices();
      this.loadStatus();
      this._statusInterval = setInterval(() => {
        if (this.tab === 'system') {
          this.loadStatus();
        }
      }, 10000);
      this._sitesInterval = setInterval(() => {
        if (this.tab === 'sites') {
          this.loadSites();
          this.loadNodeVersions();
        }
      }, 5000);
    },

    tabTitle() {
      const map = { sites: 'Sites', services: 'Services', system: 'System' };
      return map[this.tab] || '';
    },

    capitalize(s) {
      return s.charAt(0).toUpperCase() + s.slice(1);
    },

    async loadVersion() {
      try {
        const res = await fetch('/api/version');
        const data = await res.json();
        this.version.current = data.current || 'dev';
      } catch (_) {}
    },

    async checkVersion() {
      this.version.checking = true;
      try {
        const res = await fetch('/api/version');
        const data = await res.json();
        this.version.current = data.current || 'dev';
        this.version.latest = data.latest || '';
        this.version.hasUpdate = data.has_update || false;
        this.version.checked = true;
      } catch (_) {
        this.version.checked = true;
        this.version.hasUpdate = false;
      } finally {
        this.version.checking = false;
      }
    },

    async runUpdate() {
      this.version.updating = true;
      try {
        await fetch('/api/update', { method: 'POST' });
        this.version.updateDone = true;
        this.version.hasUpdate = false;
      } catch (_) {} finally {
        this.version.updating = false;
      }
    },

    async loadSites() {
      const firstLoad = !this._sitesLoaded;
      if (firstLoad) this.sitesLoading = true;
      try {
        const res = await fetch('/api/sites');
        const raw = await res.json();
        this._sitesLoaded = true;
        if (firstLoad) {
          this.sites = raw.map(s => ({ ...s, tlsLoading: false, tlsError: '', versionLoading: false }));
        } else {
          // Update data in-place to avoid full table re-render
          raw.forEach(s => {
            const e = this.sites.find(x => x.domain === s.domain);
            if (e) {
              e.php_version = s.php_version;
              e.node_version = s.node_version;
              e.tls = s.tls;
              e.fpm_running = s.fpm_running;
            } else {
              this.sites.push({ ...s, tlsLoading: false, tlsError: '', versionLoading: false });
            }
          });
          this.sites = this.sites.filter(e => raw.some(s => s.domain === e.domain));
        }
      } catch (_) {
        if (firstLoad) this.sites = [];
      } finally {
        if (firstLoad) this.sitesLoading = false;
      }
    },

    async loadServices() {
      this.servicesLoading = true;
      try {
        const res = await fetch('/api/services');
        const data = await res.json();
        this.services = data.map(s => ({ ...s, loading: false, copied: false, flash: '', error: '', logs: '', showEnv: false }));
      } catch (_) {
        this.services = [];
      } finally {
        this.servicesLoading = false;
      }
    },

    async toggleService(svc, action) {
      svc.loading = true;
      svc.error = '';
      svc.logs = '';
      svc.flash = '';
      try {
        const res = await fetch(`/api/services/${svc.name}/${action}`, { method: 'POST' });
        const data = await res.json();
        svc.status = data.status;
        svc.env_vars = data.env_vars;
        if (data.ok) {
          svc.flash = action === 'start' ? 'Started successfully' : 'Stopped';
          setTimeout(() => { svc.flash = ''; }, 3000);
        } else {
          svc.error = data.error || 'Unknown error';
          svc.logs = data.logs || '';
        }
      } catch (e) {
        svc.error = e.message || 'Request failed';
      } finally {
        svc.loading = false;
      }
    },

    envPreview(svc) {
      return Object.entries(svc.env_vars || {})
        .map(([k, v]) => `${k}=${v}`)
        .join('\n');
    },

    async copyEnvVars(svc) {
      const text = this.envPreview(svc);
      try {
        await navigator.clipboard.writeText(text);
      } catch (_) {
        // Fallback for non-HTTPS contexts
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.focus();
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
      }
      svc.copied = true;
      setTimeout(() => { svc.copied = false; }, 2000);
    },

    async loadPHPVersions() {
      try {
        const res = await fetch('/api/php-versions');
        this.phpVersions = await res.json();
      } catch (_) {}
    },

    async loadNodeVersions() {
      try {
        const res = await fetch('/api/node-versions');
        this.nodeVersions = await res.json();
      } catch (_) {}
    },

    async installNodeVersion() {
      const v = this.nodeInstall.version.trim();
      if (!v) return;
      this.nodeInstall.installing = true;
      this.nodeInstall.error = '';
      this.nodeInstall.done = false;
      try {
        const res = await fetch(`/api/node-versions/install?version=${encodeURIComponent(v)}`, { method: 'POST' });
        const data = await res.json();
        if (data.ok) {
          this.nodeInstall.done = true;
          this.nodeInstall.version = '';
          setTimeout(() => { this.nodeInstall.done = false; }, 3000);
          await this.loadNodeVersions();
        } else {
          this.nodeInstall.error = data.error || 'Install failed';
        }
      } catch (e) {
        this.nodeInstall.error = e.message || 'Request failed';
      } finally {
        this.nodeInstall.installing = false;
      }
    },

    async setSiteVersion(site, type, version) {
      if (!version) return;
      site.versionLoading = true;
      try {
        const res = await fetch(`/api/sites/${site.domain}/${type}?version=${encodeURIComponent(version)}`, { method: 'POST' });
        const data = await res.json();
        if (!data.ok) {
          // Revert on failure — reload sites to get actual state
          await this.loadSites();
        }
      } catch (_) {
        await this.loadSites();
      } finally {
        site.versionLoading = false;
      }
    },

    async toggleTLS(site) {
      site.tlsLoading = true;
      site.tlsError = '';
      const action = site.tls ? 'unsecure' : 'secure';
      try {
        const res = await fetch(`/api/sites/${site.domain}/${action}`, { method: 'POST' });
        const data = await res.json();
        if (data.ok) {
          site.tls = !site.tls;
        } else {
          site.tlsError = data.error || 'Failed';
        }
      } catch (e) {
        site.tlsError = e.message || 'Request failed';
      } finally {
        site.tlsLoading = false;
      }
    },

    fpmContainer(site) {
      if (!site.php_version) return '';
      return 'lerd-php' + site.php_version.replace('.', '') + '-fpm';
    },

    openLogs(site) {
      const container = this.fpmContainer(site);
      if (!container) return;
      // If already showing this container, just close
      if (this.logs.open && this.logs.container === container) {
        this.closeLogs();
        return;
      }
      this.closeLogs();
      this.logs.container = container;
      this.logs.lines = [];
      this.logs.open = true;
      this.logs.connected = false;

      const src = new EventSource(`/api/logs/${container}`);
      this.logs._source = src;

      src.onopen = () => { this.logs.connected = true; };
      src.onerror = () => { this.logs.connected = false; };
      src.onmessage = (e) => {
        this.logs.lines.push(e.data);
        // keep last 500 lines
        if (this.logs.lines.length > 500) {
          this.logs.lines.splice(0, this.logs.lines.length - 500);
        }
        this.$nextTick(() => {
          const el = this.$refs.logScroll;
          if (el) el.scrollTop = el.scrollHeight;
        });
      };
    },

    closeLogs() {
      if (this.logs._source) {
        this.logs._source.close();
        this.logs._source = null;
      }
      this.logs.open = false;
      this.logs.connected = false;
    },

    clearLogs() {
      this.logs.lines = [];
    },

    async loadStatus() {
      this.statusLoading = (Object.keys(this.systemStatus).length === 0);
      try {
        const res = await fetch('/api/status');
        this.systemStatus = await res.json();
      } catch (_) {} finally {
        this.statusLoading = false;
      }
    },
  };
}
</script>
</body>
</html>
