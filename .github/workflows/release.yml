name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  ci:
    name: CI Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install tray build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --fix-missing libappindicator3-dev

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: CGO_ENABLED=1 go build -tags legacy_appindicator -o /dev/null ./cmd/lerd

      - name: Test
        run: CGO_ENABLED=1 go test -tags legacy_appindicator ./...

      - name: Vet
        run: CGO_ENABLED=1 go vet -tags legacy_appindicator ./...

      - name: Format
        run: test -z "$(gofmt -l .)"

  build-darwin-tray:
    name: Build macOS tray (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: macos-latest
            arch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build lerd-tray
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          mkdir -p dist/lerd-tray_darwin_${{ matrix.arch }}
          CGO_ENABLED=1 go build \
            -ldflags="-s -w \
              -X github.com/geodro/lerd/internal/version.Version=${VERSION} \
              -X github.com/geodro/lerd/internal/version.Commit=${COMMIT} \
              -X github.com/geodro/lerd/internal/version.Date=${DATE}" \
            -o dist/lerd-tray_darwin_${{ matrix.arch }}/lerd-tray \
            ./cmd/lerd-tray

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lerd-tray-darwin-${{ matrix.arch }}
          path: dist/lerd-tray_darwin_${{ matrix.arch }}/lerd-tray
          retention-days: 1

  release:
    name: GoReleaser
    needs: [ci, build-darwin-tray]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for changelog generation

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install tray build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --fix-missing libappindicator3-dev

      - name: Download macOS tray binaries
        uses: actions/download-artifact@v4
        with:
          pattern: lerd-tray-darwin-*
          path: dist-tray

      - name: Stage macOS tray binaries for GoReleaser
        run: |
          rm -rf dist/
          mkdir -p dist/lerd-tray_darwin_arm64
          cp dist-tray/lerd-tray-darwin-arm64/lerd-tray dist/lerd-tray_darwin_arm64/lerd-tray
          chmod +x dist/lerd-tray_darwin_arm64/lerd-tray

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
